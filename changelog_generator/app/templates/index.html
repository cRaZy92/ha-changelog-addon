<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changelog Generator</title>
    <style>
        :root {
            --primary: #03a9f4;
            --primary-dark: #0288d1;
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #212121;
            --text-secondary: #757575;
            --border: #e0e0e0;
            --error: #f44336;
            --success: #4caf50;
            --info: #2196f3;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1c1c1c;
                --surface: #2c2c2c;
                --text: #e0e0e0;
                --text-secondary: #9e9e9e;
                --border: #424242;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.5;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-bar .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-ok { background: var(--success); color: white; }
        .badge-warn { background: #ff9800; color: white; }
        .badge-error { background: var(--error); color: white; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .actions { margin-bottom: 20px; }

        .message {
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }

        .message-error {
            background: #ffebee;
            color: var(--error);
            border: 1px solid #ffcdd2;
        }

        .message-info {
            background: #e3f2fd;
            color: var(--info);
            border: 1px solid #bbdefb;
        }

        @media (prefers-color-scheme: dark) {
            .message-error { background: #4a1a1a; border-color: #6a2a2a; color: #ff8a80; }
            .message-info { background: #1a3a4a; border-color: #2a4a5a; color: #80d8ff; }
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .changelog-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }

        .changelog-box h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
        }

        .changelog-content {
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .changelog-content h1 { font-size: 1.3rem; margin: 16px 0 8px; }
        .changelog-content h2 { font-size: 1.1rem; margin: 14px 0 6px; }
        .changelog-content h3 { font-size: 1rem; margin: 12px 0 4px; }
        .changelog-content h4 { font-size: 0.95rem; margin: 10px 0 4px; }
        .changelog-content ul, .changelog-content ol { padding-left: 20px; margin: 8px 0; }
        .changelog-content li { margin: 4px 0; }
        .changelog-content code {
            background: var(--border);
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 0.85em;
        }
        .changelog-content pre {
            background: var(--border);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .changelog-content pre code { background: none; padding: 0; }
        .changelog-content p { margin: 8px 0; }
        .changelog-content strong { font-weight: 600; }

        .meta {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .history-section { margin-top: 24px; }

        .history-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            text-align: left;
        }

        .history-list {
            display: none;
            margin-top: 12px;
        }

        .history-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .history-item-header {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .history-item .changelog-content { font-size: 0.9rem; }

        /* Settings panel */
        .settings-section { margin-top: 24px; }

        .settings-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            text-align: left;
        }

        .settings-panel {
            display: none;
            margin-top: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
        }

        .form-group textarea { min-height: 80px; resize: vertical; }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .btn-sm {
            padding: 6px 16px;
            font-size: 0.85rem;
        }

        .btn-save {
            background: var(--success);
            color: white;
        }

        .btn-save:hover { opacity: 0.9; }

        .pending-commits {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .pending-commits h2 {
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .pending-commits .commit-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .pending-commits .commit-item {
            display: flex;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            align-items: baseline;
        }

        .pending-commits .commit-item:last-child { border-bottom: none; }

        .commit-hash {
            font-family: monospace;
            color: var(--primary);
            flex-shrink: 0;
        }

        .commit-msg { flex: 1; }

        .commit-date {
            color: var(--text-secondary);
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .pending-empty {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-style: italic;
        }

        .settings-msg {
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body data-ingress="{{ ingress_path }}">
    <h1>Changelog Generator</h1>

    <div class="status-bar" id="statusBar">
        <span id="statusApiKey"></span>
        <span id="statusModel"></span>
        <span id="statusLastRun"></span>
        <span id="statusCooldown"></span>
    </div>

    <div class="pending-commits" id="pendingCommits" style="display:none;">
        <h2>Pending Commits</h2>
        <ul class="commit-list" id="commitList"></ul>
    </div>

    <div class="message message-error" id="errorMsg"></div>
    <div class="message message-info" id="infoMsg"></div>

    <div class="actions">
        <button class="btn btn-primary" id="generateBtn" onclick="generate()">
            <span id="btnText">Generate Changelog</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </div>

    <div class="changelog-box" id="changelogBox">
        <h2>Latest Changelog</h2>
        <div class="changelog-content" id="changelogContent"></div>
        <div class="meta" id="changelogMeta"></div>
    </div>

    <div class="history-section">
        <button class="history-toggle" id="historyToggle" onclick="toggleHistory()">
            History (0)
        </button>
        <div class="history-list" id="historyList"></div>
    </div>

    <div class="settings-section">
        <button class="settings-toggle" onclick="toggleSettings()">Settings</button>
        <div class="settings-panel" id="settingsPanel">
            <div class="form-group">
                <label for="setApiKey">OpenAI API Key</label>
                <input type="password" id="setApiKey" placeholder="sk-...">
                <div class="form-hint" id="setApiKeyHint">Not set</div>
            </div>
            <div class="form-group">
                <label for="setModel">Model</label>
                <select id="setModel">
                    <option value="gpt-4o-mini">gpt-4o-mini</option>
                    <option value="gpt-4o">gpt-4o</option>
                    <option value="gpt-4.1-mini">gpt-4.1-mini</option>
                    <option value="gpt-4.1-nano">gpt-4.1-nano</option>
                </select>
            </div>
            <div class="form-group">
                <label for="setCooldown">Cooldown (seconds)</label>
                <input type="number" id="setCooldown" min="10" max="600">
            </div>
            <div class="form-group">
                <label for="setMaxDiff">Max Diff Size (characters)</label>
                <input type="number" id="setMaxDiff" min="10000" max="500000">
            </div>
            <div class="form-group">
                <label for="setHistoryCount">History Count</label>
                <input type="number" id="setHistoryCount" min="1" max="100">
            </div>
            <button class="btn btn-sm btn-save" onclick="saveSettings()">Save Settings</button>
            <div class="settings-msg" id="settingsMsg"></div>
        </div>
    </div>

    <script>
        const BASE = document.querySelector('body').dataset.ingress || '';

        function apiUrl(path) {
            return BASE + path;
        }

        // Block-level markdown to HTML
        function md(text) {
            if (!text) return '';

            // Extract code blocks first
            const codeBlocks = [];
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                codeBlocks.push('<pre><code>' + escHtml(code) + '</code></pre>');
                return '\x00CB' + (codeBlocks.length - 1) + '\x00';
            });

            const lines = text.split('\n');
            let html = '';
            let inList = false;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];

                // Code block placeholder
                const cbMatch = line.match(/^\x00CB(\d+)\x00$/);
                if (cbMatch) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += codeBlocks[parseInt(cbMatch[1])];
                    continue;
                }

                // Empty line
                if (!line.trim()) {
                    if (inList) { html += '</ul>'; inList = false; }
                    continue;
                }

                // Inline formatting
                line = line
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.+?)\*/g, '<em>$1</em>');

                // Headers
                const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
                if (hMatch) {
                    if (inList) { html += '</ul>'; inList = false; }
                    const level = hMatch[1].length;
                    html += '<h' + level + '>' + hMatch[2] + '</h' + level + '>';
                    continue;
                }

                // List items
                const liMatch = line.match(/^[\s]*[-*]\s+(.+)$/);
                if (liMatch) {
                    if (!inList) { html += '<ul>'; inList = true; }
                    html += '<li>' + liMatch[1] + '</li>';
                    continue;
                }

                // Regular paragraph
                if (inList) { html += '</ul>'; inList = false; }
                html += '<p>' + line + '</p>';
            }

            if (inList) html += '</ul>';

            // Restore code blocks
            return html;
        }

        function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('infoMsg').style.display = 'none';
        }

        function showInfo(msg) {
            const el = document.getElementById('infoMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function clearMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('infoMsg').style.display = 'none';
        }

        async function loadStatus() {
            try {
                const resp = await fetch(apiUrl('/api/status'));
                const data = await resp.json();

                const keyEl = document.getElementById('statusApiKey');
                if (data.has_api_key) {
                    keyEl.innerHTML = '<span class="badge badge-ok">API Key Set</span>';
                } else {
                    keyEl.innerHTML = '<span class="badge badge-error">No API Key</span>';
                }

                document.getElementById('statusModel').textContent = 'Model: ' + (data.model || '—');

                if (data.last_run_time) {
                    const d = new Date(data.last_run_time);
                    document.getElementById('statusLastRun').textContent = 'Last: ' + d.toLocaleString();
                } else {
                    document.getElementById('statusLastRun').textContent = 'Never run';
                }

                const cdEl = document.getElementById('statusCooldown');
                if (data.cooldown_remaining > 0) {
                    cdEl.innerHTML = '<span class="badge badge-warn">Cooldown: ' + data.cooldown_remaining + 's</span>';
                    document.getElementById('generateBtn').disabled = true;
                } else {
                    cdEl.textContent = '';
                    document.getElementById('generateBtn').disabled = !data.has_api_key;
                }
            } catch (e) {
                console.error('Failed to load status:', e);
            }
        }

        async function loadHistory() {
            try {
                const resp = await fetch(apiUrl('/api/history'));
                const data = await resp.json();
                const list = data.history || [];

                document.getElementById('historyToggle').textContent = 'History (' + list.length + ')';

                const container = document.getElementById('historyList');
                container.innerHTML = '';

                list.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    const d = new Date(item.generated_at);
                    div.innerHTML = '<div class="history-item-header">' +
                        d.toLocaleString() + ' — ' +
                        item.commit_count + ' commit(s) — ' +
                        item.tokens_used + ' tokens' +
                        '</div>' +
                        '<div class="changelog-content">' + md(item.changelog) + '</div>';
                    container.appendChild(div);
                });
            } catch (e) {
                console.error('Failed to load history:', e);
            }
        }

        async function generate() {
            clearMessages();
            const btn = document.getElementById('generateBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');

            btn.disabled = true;
            btnText.textContent = 'Generating...';
            spinner.style.display = 'block';

            try {
                const resp = await fetch(apiUrl('/api/generate'), { method: 'POST' });
                const data = await resp.json();

                if (data.success) {
                    const box = document.getElementById('changelogBox');
                    box.style.display = 'block';
                    document.getElementById('changelogContent').innerHTML = md(data.changelog);

                    const meta = data.metadata;
                    document.getElementById('changelogMeta').textContent =
                        meta.commit_count + ' commit(s) • ' +
                        meta.model_used + ' • ' +
                        meta.tokens_used + ' tokens • ' +
                        new Date(meta.generated_at).toLocaleString();

                    loadHistory();
                    loadStatus();
                    loadPendingCommits();
                } else {
                    showError(data.error || 'Unknown error');
                }
            } catch (e) {
                showError('Request failed: ' + e.message);
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Generate Changelog';
                spinner.style.display = 'none';
                loadStatus();
            }
        }

        function toggleHistory() {
            const list = document.getElementById('historyList');
            list.style.display = (list.style.display === 'none' || !list.style.display) ? 'block' : 'none';
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            if (panel.style.display === 'none' || !panel.style.display) {
                panel.style.display = 'block';
                loadSettings();
            } else {
                panel.style.display = 'none';
            }
        }

        async function loadSettings() {
            try {
                const resp = await fetch(apiUrl('/api/settings'));
                const s = await resp.json();

                document.getElementById('setApiKey').value = '';
                const hint = document.getElementById('setApiKeyHint');
                if (s.has_api_key) {
                    hint.textContent = 'Current: ' + s.openai_api_key_masked;
                    hint.style.color = 'var(--success)';
                } else {
                    hint.textContent = 'Not set — enter your key above';
                    hint.style.color = 'var(--error)';
                }

                document.getElementById('setModel').value = s.openai_model;
                document.getElementById('setCooldown').value = s.cooldown_seconds;
                document.getElementById('setMaxDiff').value = s.max_diff_chars;
                document.getElementById('setHistoryCount').value = s.history_count;
            } catch (e) {
                console.error('Failed to load settings:', e);
            }
        }

        async function saveSettings() {
            const msgEl = document.getElementById('settingsMsg');
            const updates = {};

            const apiKey = document.getElementById('setApiKey').value.trim();
            if (apiKey) updates.openai_api_key = apiKey;

            updates.openai_model = document.getElementById('setModel').value;
            updates.cooldown_seconds = parseInt(document.getElementById('setCooldown').value) || 60;
            updates.max_diff_chars = parseInt(document.getElementById('setMaxDiff').value) || 100000;
            updates.history_count = parseInt(document.getElementById('setHistoryCount').value) || 20;

            try {
                const resp = await fetch(apiUrl('/api/settings'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates),
                });
                const data = await resp.json();

                if (data.success) {
                    msgEl.textContent = 'Settings saved!';
                    msgEl.style.color = 'var(--success)';
                    msgEl.style.display = 'block';
                    document.getElementById('setApiKey').value = '';
                    loadSettings();
                    loadStatus();
                } else {
                    msgEl.textContent = 'Error: ' + (data.error || 'Unknown');
                    msgEl.style.color = 'var(--error)';
                    msgEl.style.display = 'block';
                }
            } catch (e) {
                msgEl.textContent = 'Failed to save: ' + e.message;
                msgEl.style.color = 'var(--error)';
                msgEl.style.display = 'block';
            }

            setTimeout(() => { msgEl.style.display = 'none'; }, 4000);
        }

        async function loadPendingCommits() {
            try {
                const resp = await fetch(apiUrl('/api/pending-commits'));
                const data = await resp.json();
                const commits = data.commits || [];
                const container = document.getElementById('pendingCommits');
                const list = document.getElementById('commitList');

                if (commits.length === 0) {
                    container.style.display = 'block';
                    list.innerHTML = '<li class="pending-empty">No new commits since last run</li>';
                    return;
                }

                container.style.display = 'block';
                document.querySelector('#pendingCommits h2').textContent =
                    'Pending Commits (' + commits.length + ')';

                list.innerHTML = '';
                commits.forEach(c => {
                    const li = document.createElement('li');
                    li.className = 'commit-item';
                    li.innerHTML =
                        '<span class="commit-hash">' + escHtml(c.hash.substring(0, 7)) + '</span>' +
                        '<span class="commit-msg">' + escHtml(c.message) + '</span>' +
                        '<span class="commit-date">' + escHtml(c.date.substring(0, 16)) + '</span>';
                    list.appendChild(li);
                });
            } catch (e) {
                console.error('Failed to load pending commits:', e);
            }
        }

        // Init
        loadStatus();
        loadHistory();
        loadPendingCommits();

        // Refresh status every 10s (for cooldown countdown)
        setInterval(loadStatus, 10000);
    </script>
</body>
</html>
