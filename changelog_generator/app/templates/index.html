<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changelog Generator</title>
    <style>
        :root {
            --primary: #03a9f4;
            --primary-dark: #0288d1;
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #212121;
            --text-secondary: #757575;
            --border: #e0e0e0;
            --error: #f44336;
            --success: #4caf50;
            --info: #2196f3;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1c1c1c;
                --surface: #2c2c2c;
                --text: #e0e0e0;
                --text-secondary: #9e9e9e;
                --border: #424242;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.5;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-bar .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-ok { background: var(--success); color: white; }
        .badge-warn { background: #ff9800; color: white; }
        .badge-error { background: var(--error); color: white; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .actions { margin-bottom: 20px; }

        .message {
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }

        .message-error {
            background: #ffebee;
            color: var(--error);
            border: 1px solid #ffcdd2;
        }

        .message-info {
            background: #e3f2fd;
            color: var(--info);
            border: 1px solid #bbdefb;
        }

        @media (prefers-color-scheme: dark) {
            .message-error { background: #4a1a1a; border-color: #6a2a2a; color: #ff8a80; }
            .message-info { background: #1a3a4a; border-color: #2a4a5a; color: #80d8ff; }
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .changelog-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }

        .changelog-box h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
        }

        .changelog-content {
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .changelog-content h1 { font-size: 1.3rem; margin: 16px 0 8px; }
        .changelog-content h2 { font-size: 1.1rem; margin: 14px 0 6px; }
        .changelog-content h3 { font-size: 1rem; margin: 12px 0 4px; }
        .changelog-content h4 { font-size: 0.95rem; margin: 10px 0 4px; }
        .changelog-content ul, .changelog-content ol { padding-left: 20px; margin: 8px 0; }
        .changelog-content li { margin: 4px 0; }
        .changelog-content code {
            background: var(--border);
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 0.85em;
        }
        .changelog-content pre {
            background: var(--border);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .changelog-content pre code { background: none; padding: 0; }
        .changelog-content p { margin: 8px 0; }
        .changelog-content strong { font-weight: 600; }

        .meta {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .history-section { margin-top: 24px; }

        .history-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            text-align: left;
        }

        .history-list {
            display: none;
            margin-top: 12px;
        }

        .history-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .history-item-header {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .history-item .changelog-content { font-size: 0.9rem; }

        /* Settings panel */
        .settings-section { margin-top: 24px; }

        .settings-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            text-align: left;
        }

        .settings-panel {
            display: none;
            margin-top: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .settings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .settings-table td {
            padding: 8px 4px;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
        }

        .settings-table td:first-child {
            color: var(--text-secondary);
            font-weight: 600;
            width: 140px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
        }

        .form-group textarea { min-height: 80px; resize: vertical; }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .btn-sm {
            padding: 6px 16px;
            font-size: 0.85rem;
        }



        .pending-commits {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .pending-commits h2 {
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .pending-commits .commit-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 500px;
            overflow-y: auto;
        }

        .pending-commits .commit-item {
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .pending-commits .commit-item:last-child { border-bottom: none; }

        .commit-row {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            align-items: center;
            cursor: pointer;
        }

        .commit-row:hover { background: var(--bg); }

        .commit-checkbox {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .commit-hash {
            font-family: monospace;
            color: var(--primary);
            flex-shrink: 0;
        }

        .commit-msg { flex: 1; }

        .commit-date {
            color: var(--text-secondary);
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .commit-tokens {
            font-size: 0.7rem;
            color: var(--text-secondary);
            background: var(--bg);
            padding: 1px 6px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .commit-diff {
            display: none;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin: 4px 0 8px 24px;
            font-family: monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow: auto;
            line-height: 1.4;
        }

        .diff-add { color: var(--success); }
        .diff-del { color: var(--error); }
        .diff-hunk { color: var(--primary); font-weight: 600; }

        .commit-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.8rem;
        }

        .commit-controls label {
            cursor: pointer;
            color: var(--text-secondary);
        }

        .token-summary {
            margin-left: auto;
            font-weight: 600;
            color: var(--text);
        }

        .pending-empty {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-style: italic;
        }

    </style>
</head>
<body data-ingress="{{ ingress_path }}">
    <h1>Changelog Generator</h1>

    <div class="status-bar" id="statusBar">
        <span id="statusApiKey"></span>
        <span id="statusModel"></span>
        <span id="statusLastRun"></span>
        <span id="statusCooldown"></span>
    </div>

    <div class="pending-commits" id="pendingCommits" style="display:none;">
        <h2>Pending Commits</h2>
        <div class="commit-controls" id="commitControls" style="display:none;">
            <label><input type="checkbox" id="selectAll" checked onchange="toggleSelectAll(this.checked)"> Select all</label>
            <span class="token-summary" id="tokenSummary"></span>
        </div>
        <ul class="commit-list" id="commitList"></ul>
    </div>

    <div class="message message-error" id="errorMsg"></div>
    <div class="message message-info" id="infoMsg"></div>

    <div class="actions">
        <button class="btn btn-primary" id="generateBtn" onclick="generate()">
            <span id="btnText">Generate Changelog</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </div>

    <div class="changelog-box" id="changelogBox">
        <h2>Latest Changelog</h2>
        <div class="changelog-content" id="changelogContent"></div>
        <div class="meta" id="changelogMeta"></div>
    </div>

    <div class="history-section">
        <button class="history-toggle" id="historyToggle" onclick="toggleHistory()">
            History (0)
        </button>
        <div class="history-list" id="historyList"></div>
    </div>

    <div class="settings-section">
        <button class="settings-toggle" onclick="toggleSettings()">Settings</button>
        <div class="settings-panel" id="settingsPanel">
            <div class="form-hint" style="margin-bottom: 12px;">Settings are managed in the Home Assistant addon configuration page.</div>
            <table class="settings-table">
                <tr><td>API Key</td><td id="cfgApiKey">—</td></tr>
                <tr><td>Model</td><td><select id="cfgModel" onchange="saveModelChoice(this.value)" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-size:0.85rem;"><option>Loading...</option></select></td></tr>
                <tr><td>Cooldown</td><td id="cfgCooldown">—</td></tr>
                <tr><td>Max Diff Size</td><td id="cfgMaxDiff">—</td></tr>
                <tr><td>History Count</td><td id="cfgHistoryCount">—</td></tr>
                <tr><td>Excluded Paths</td><td id="cfgExcluded">—</td></tr>
            </table>
        </div>
    </div>

    <script>
        const BASE = document.querySelector('body').dataset.ingress || '';

        function apiUrl(path) {
            return BASE + path;
        }

        // Block-level markdown to HTML
        function md(text) {
            if (!text) return '';

            // Extract code blocks first
            const codeBlocks = [];
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                codeBlocks.push('<pre><code>' + escHtml(code) + '</code></pre>');
                return '\x00CB' + (codeBlocks.length - 1) + '\x00';
            });

            const lines = text.split('\n');
            let html = '';
            let inList = false;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];

                // Code block placeholder
                const cbMatch = line.match(/^\x00CB(\d+)\x00$/);
                if (cbMatch) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += codeBlocks[parseInt(cbMatch[1])];
                    continue;
                }

                // Empty line
                if (!line.trim()) {
                    if (inList) { html += '</ul>'; inList = false; }
                    continue;
                }

                // Inline formatting
                line = line
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.+?)\*/g, '<em>$1</em>');

                // Headers
                const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
                if (hMatch) {
                    if (inList) { html += '</ul>'; inList = false; }
                    const level = hMatch[1].length;
                    html += '<h' + level + '>' + hMatch[2] + '</h' + level + '>';
                    continue;
                }

                // List items
                const liMatch = line.match(/^[\s]*[-*]\s+(.+)$/);
                if (liMatch) {
                    if (!inList) { html += '<ul>'; inList = true; }
                    html += '<li>' + liMatch[1] + '</li>';
                    continue;
                }

                // Regular paragraph
                if (inList) { html += '</ul>'; inList = false; }
                html += '<p>' + line + '</p>';
            }

            if (inList) html += '</ul>';

            // Restore code blocks
            return html;
        }

        function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('infoMsg').style.display = 'none';
        }

        function showInfo(msg) {
            const el = document.getElementById('infoMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function clearMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('infoMsg').style.display = 'none';
        }

        async function loadStatus() {
            try {
                const resp = await fetch(apiUrl('/api/status'));
                const data = await resp.json();

                const keyEl = document.getElementById('statusApiKey');
                if (data.has_api_key) {
                    keyEl.innerHTML = '<span class="badge badge-ok">API Key Set</span>';
                } else {
                    keyEl.innerHTML = '<span class="badge badge-error">No API Key</span>';
                }

                document.getElementById('statusModel').textContent = 'Model: ' + (data.model || '—');

                systemPromptTokens = data.system_prompt_tokens || 0;
                maxDiffTokens = data.max_diff_tokens || 0;
                updateTokenSummary();

                if (data.last_run_time) {
                    const d = new Date(data.last_run_time);
                    document.getElementById('statusLastRun').textContent = 'Last: ' + d.toLocaleString();
                } else {
                    document.getElementById('statusLastRun').textContent = 'Never run';
                }

                const cdEl = document.getElementById('statusCooldown');
                if (data.cooldown_remaining > 0) {
                    cdEl.innerHTML = '<span class="badge badge-warn">Cooldown: ' + data.cooldown_remaining + 's</span>';
                    document.getElementById('generateBtn').disabled = true;
                } else {
                    cdEl.textContent = '';
                    const noSelection = document.querySelectorAll('.commit-checkbox').length > 0 &&
                        document.querySelectorAll('.commit-checkbox:checked').length === 0;
                    document.getElementById('generateBtn').disabled = !data.has_api_key || noSelection;
                }
            } catch (e) {
                console.error('Failed to load status:', e);
            }
        }

        async function loadHistory() {
            try {
                const resp = await fetch(apiUrl('/api/history'));
                const data = await resp.json();
                const list = data.history || [];

                document.getElementById('historyToggle').textContent = 'History (' + list.length + ')';

                const container = document.getElementById('historyList');
                container.innerHTML = '';

                list.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    const d = new Date(item.generated_at);
                    div.innerHTML = '<div class="history-item-header">' +
                        d.toLocaleString() + ' — ' +
                        item.commit_count + ' commit(s) — ' +
                        item.tokens_used + ' tokens' +
                        '</div>' +
                        '<div class="changelog-content">' + md(item.changelog) + '</div>';
                    container.appendChild(div);
                });
            } catch (e) {
                console.error('Failed to load history:', e);
            }
        }

        async function generate() {
            clearMessages();
            const btn = document.getElementById('generateBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');

            btn.disabled = true;
            btnText.textContent = 'Generating...';
            spinner.style.display = 'block';

            try {
                const selected = getSelectedCommits();
                const payload = {};
                if (selectedModel) payload.model = selectedModel;
                if (selected.length > 0) payload.selected_commits = selected;
                const body = Object.keys(payload).length ? JSON.stringify(payload) : null;
                const resp = await fetch(apiUrl('/api/generate'), {
                    method: 'POST',
                    headers: body ? {'Content-Type': 'application/json'} : {},
                    body: body,
                });
                const data = await resp.json();

                if (data.success) {
                    const box = document.getElementById('changelogBox');
                    box.style.display = 'block';
                    document.getElementById('changelogContent').innerHTML = md(data.changelog);

                    const meta = data.metadata;
                    document.getElementById('changelogMeta').textContent =
                        meta.commit_count + ' commit(s) • ' +
                        meta.model_used + ' • ' +
                        meta.tokens_used + ' tokens • ' +
                        new Date(meta.generated_at).toLocaleString();

                    loadHistory();
                    loadStatus();
                    loadPendingCommits();
                } else {
                    showError(data.error || 'Unknown error');
                }
            } catch (e) {
                showError('Request failed: ' + e.message);
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Generate Changelog';
                spinner.style.display = 'none';
                loadStatus();
            }
        }

        function toggleHistory() {
            const list = document.getElementById('historyList');
            list.style.display = (list.style.display === 'none' || !list.style.display) ? 'block' : 'none';
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            if (panel.style.display === 'none' || !panel.style.display) {
                panel.style.display = 'block';
                loadSettings();
            } else {
                panel.style.display = 'none';
            }
        }

        let selectedModel = null;

        async function loadSettings() {
            try {
                const resp = await fetch(apiUrl('/api/settings'));
                const s = await resp.json();

                const keyEl = document.getElementById('cfgApiKey');
                if (s.has_api_key) {
                    keyEl.textContent = s.openai_api_key_masked;
                    keyEl.style.color = 'var(--success)';
                } else {
                    keyEl.textContent = 'Not set';
                    keyEl.style.color = 'var(--error)';
                }

                // Set default model from config
                if (!selectedModel) {
                    selectedModel = localStorage.getItem('changelog_model') || s.openai_model;
                }
                document.getElementById('statusModel').textContent = 'Model: ' + selectedModel;

                document.getElementById('cfgCooldown').textContent = s.cooldown_seconds + 's';
                document.getElementById('cfgMaxDiff').textContent = s.max_diff_chars.toLocaleString();
                document.getElementById('cfgHistoryCount').textContent = s.history_count;
                document.getElementById('cfgExcluded').textContent = s.excluded_paths.join(', ') || 'None';

                // Load models for dropdown
                loadModels(s.openai_model);
            } catch (e) {
                console.error('Failed to load settings:', e);
            }
        }

        let modelsLoaded = false;
        async function loadModels(defaultModel) {
            if (modelsLoaded) return;
            const select = document.getElementById('cfgModel');
            try {
                const resp = await fetch(apiUrl('/api/models'));
                const data = await resp.json();
                const models = data.models || [];
                select.innerHTML = '';

                if (models.length === 0) {
                    select.innerHTML = '<option>' + escHtml(selectedModel || defaultModel) + '</option>';
                    return;
                }

                const current = selectedModel || defaultModel;
                // Ensure current model is in list
                if (current && !models.includes(current)) {
                    models.unshift(current);
                }

                models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m;
                    if (m === current) opt.selected = true;
                    select.appendChild(opt);
                });
                modelsLoaded = true;
            } catch (e) {
                select.innerHTML = '<option>' + escHtml(selectedModel || defaultModel) + '</option>';
                console.error('Failed to load models:', e);
            }
        }

        function saveModelChoice(model) {
            selectedModel = model;
            localStorage.setItem('changelog_model', model);
            document.getElementById('statusModel').textContent = 'Model: ' + model;
        }

        // Track commit token counts: { hash: tokenCount }
        const commitTokens = {};
        let systemPromptTokens = 0;
        let maxDiffTokens = 0;

        async function loadPendingCommits() {
            try {
                const resp = await fetch(apiUrl('/api/pending-commits'));
                const data = await resp.json();
                const commits = data.commits || [];
                const container = document.getElementById('pendingCommits');
                const list = document.getElementById('commitList');
                const controls = document.getElementById('commitControls');

                if (commits.length === 0) {
                    container.style.display = 'block';
                    controls.style.display = 'none';
                    document.querySelector('#pendingCommits h2').textContent = 'Pending Commits';
                    list.innerHTML = '<li class="pending-empty">No new commits since last run</li>';
                    return;
                }

                container.style.display = 'block';
                controls.style.display = 'flex';
                document.querySelector('#pendingCommits h2').textContent =
                    'Pending Commits (' + commits.length + ')';

                list.innerHTML = '';
                commits.forEach(c => {
                    const li = document.createElement('li');
                    li.className = 'commit-item';
                    li.innerHTML =
                        '<div class="commit-row" onclick="rowClick(event, \'' + escHtml(c.hash) + '\')">' +
                            '<input type="checkbox" class="commit-checkbox" data-hash="' + escHtml(c.hash) + '" checked onchange="updateTokenSummary()">' +
                            '<span class="commit-hash">' + escHtml(c.hash.substring(0, 7)) + '</span>' +
                            '<span class="commit-msg">' + escHtml(c.message) + '</span>' +
                            '<span class="commit-tokens" id="tokens-' + escHtml(c.hash.substring(0, 7)) + '">...</span>' +
                            '<span class="commit-date">' + escHtml(c.date.substring(0, 16)) + '</span>' +
                        '</div>' +
                        '<div class="commit-diff" id="diff-' + escHtml(c.hash) + '"></div>';
                    list.appendChild(li);
                });

                // Fetch token counts for all commits
                Object.keys(commitTokens).forEach(k => delete commitTokens[k]);
                commits.forEach(c => loadCommitTokens(c.hash));
            } catch (e) {
                console.error('Failed to load pending commits:', e);
            }
        }

        async function loadCommitTokens(hash) {
            try {
                const resp = await fetch(apiUrl('/api/commit-diff/' + hash));
                const data = await resp.json();
                commitTokens[hash] = data.tokens || 0;
                const el = document.getElementById('tokens-' + hash.substring(0, 7));
                if (el) el.textContent = formatTokens(data.tokens) + ' tok';
                updateTokenSummary();
            } catch (e) {
                const el = document.getElementById('tokens-' + hash.substring(0, 7));
                if (el) el.textContent = '?';
            }
        }

        function formatTokens(n) {
            if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
            return '' + n;
        }

        function updateTokenSummary() {
            const checkboxes = document.querySelectorAll('.commit-checkbox');
            let diffTokens = 0;
            let selectedCount = 0;
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    selectedCount++;
                    diffTokens += commitTokens[cb.dataset.hash] || 0;
                }
            });
            const willTruncate = maxDiffTokens > 0 && diffTokens > maxDiffTokens;
            const effectiveDiffTokens = willTruncate ? maxDiffTokens : diffTokens;
            const total = effectiveDiffTokens + systemPromptTokens;
            const el = document.getElementById('tokenSummary');
            let label = selectedCount + ' selected · ~' + formatTokens(total) + ' tokens (prompt: ' + formatTokens(systemPromptTokens) + ')';
            if (willTruncate) {
                label += ' ⚠ diff will be truncated';
            }
            el.textContent = label;

            // Sync select-all checkbox
            const selectAll = document.getElementById('selectAll');
            selectAll.checked = selectedCount === checkboxes.length;
            selectAll.indeterminate = selectedCount > 0 && selectedCount < checkboxes.length;

            // Disable generate button when no commits selected, re-enable otherwise
            const btn = document.getElementById('generateBtn');
            if (checkboxes.length > 0 && selectedCount === 0) {
                btn.disabled = true;
            } else if (selectedCount > 0) {
                btn.disabled = false;
            }
        }

        function toggleSelectAll(checked) {
            document.querySelectorAll('.commit-checkbox').forEach(cb => {
                cb.checked = checked;
            });
            updateTokenSummary();
        }

        function rowClick(event, hash) {
            // Don't toggle diff when clicking checkbox
            if (event.target.classList.contains('commit-checkbox')) return;
            toggleDiff(hash);
        }

        async function toggleDiff(hash) {
            const diffEl = document.getElementById('diff-' + hash);
            if (diffEl.style.display === 'block') {
                diffEl.style.display = 'none';
                return;
            }

            // Load diff if not already loaded
            if (!diffEl.dataset.loaded) {
                diffEl.textContent = 'Loading...';
                diffEl.style.display = 'block';
                try {
                    const resp = await fetch(apiUrl('/api/commit-diff/' + hash));
                    const data = await resp.json();
                    if (data.error) {
                        diffEl.textContent = 'Error: ' + data.error;
                    } else if (!data.diff) {
                        diffEl.textContent = '(no diff)';
                    } else {
                        diffEl.innerHTML = colorizeDiff(data.diff);
                    }
                    diffEl.dataset.loaded = '1';
                } catch (e) {
                    diffEl.textContent = 'Failed to load diff';
                }
            } else {
                diffEl.style.display = 'block';
            }
        }

        function colorizeDiff(text) {
            return text.split('\n').map(line => {
                const safe = escHtml(line);
                if (line.startsWith('@@')) return '<span class="diff-hunk">' + safe + '</span>';
                if (line.startsWith('+')) return '<span class="diff-add">' + safe + '</span>';
                if (line.startsWith('-')) return '<span class="diff-del">' + safe + '</span>';
                return safe;
            }).join('\n');
        }

        function getSelectedCommits() {
            const checkboxes = document.querySelectorAll('.commit-checkbox');
            const selected = [];
            checkboxes.forEach(cb => {
                if (cb.checked) selected.push(cb.dataset.hash);
            });
            return selected;
        }

        // Init
        loadStatus();
        loadHistory();
        loadPendingCommits();

        // Refresh status every 10s (for cooldown countdown)
        setInterval(loadStatus, 10000);
    </script>
</body>
</html>
